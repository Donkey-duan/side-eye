<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="明鏡性平">
  <!-- 對應站上的品牌標記：方框內的「平」。favicon 尺寸很小，
       因此以筆畫線條繪製而非文字，避免缺字型時顯示成方塊。 -->
  <rect width="32" height="32" fill="#ffffff"/>
  <rect x="2.5" y="2.5" width="27" height="27" fill="none" stroke="#0f1714" stroke-width="2.2"/>
  <g stroke="#0f1714" stroke-width="2.2" stroke-linecap="square">
    <line x1="8" y1="11.5" x2="24" y2="11.5"/>
    <line x1="12" y1="15" x2="10.5" y2="17.5"/>
    <line x1="20" y1="15" x2="21.5" y2="17.5"/>
    <line x1="7" y1="20" x2="25" y2="20"/>
    <line x1="16" y1="11.5" x2="16" y2="26"/>
  </g>
</svg>
